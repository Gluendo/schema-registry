name: Validate Schemas

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'schemas/**'
      - 'ruleset.yaml'
      - 'tools/**'
      - 'templates/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'ruleset.yaml'
      - 'tools/**'
      - 'templates/**'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON, formatting, and $ref targets
        run: python3 tools/schema-tools.py all

      - name: Bundle schemas (inline $ref)
        run: python3 tools/schema-tools.py bundle schemas dist

      - name: Install Vacuum
        run: curl -fsSL https://quobix.com/scripts/install_vacuum.sh | sh

      - name: Lint bundled schemas with Vacuum
        run: ./tools/lint.sh dist
