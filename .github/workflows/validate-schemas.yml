name: Validate Schemas

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'schemas/**'
      - 'examples/**'
      - 'ruleset.yaml'
      - 'tools/**'
      - 'templates/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'examples/**'
      - 'ruleset.yaml'
      - 'tools/**'
      - 'templates/**'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reject changes to frozen version snapshots
        if: github.event_name == 'pull_request'
        run: |
          FROZEN=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'schemas/domains/*/*/v*/' || true)
          if [ -n "$FROZEN" ]; then
            echo "::error::Frozen version snapshots must not be modified in PRs. These are managed by CI."
            echo "$FROZEN"
            exit 1
          fi

      - name: Validate JSON, formatting, $ref targets, and compatibility
        run: python3 tools/schema-tools.py all

      - name: Validate example payloads
        run: python3 tools/schema-tools.py examples schemas

      - name: Bundle schemas (inline $ref)
        run: python3 tools/schema-tools.py bundle schemas dist

      - name: Install Vacuum
        run: curl -fsSL https://quobix.com/scripts/install_vacuum.sh | sh

      - name: Lint bundled schemas with Vacuum
        run: ./tools/lint.sh dist
