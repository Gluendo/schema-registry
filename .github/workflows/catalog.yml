name: Deploy Catalog to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'catalog/**'
      - 'eventcatalog/**'
      - 'schemas/**'
      - 'tools/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build main catalog
        run: cd catalog && npm ci && npm run build

      - name: Build EventCatalog
        run: |
          cd eventcatalog && npm ci
          node generate.mjs
          npx eventcatalog build

      - name: Merge into single output
        run: cp -r eventcatalog/dist catalog/out/eventcatalog

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: catalog/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
