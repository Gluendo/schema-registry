services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: nats-server --config /etc/nats/nats-server.conf
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data/nats
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 5

  producer:
    build: ./producer
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
    profiles:
      - produce

  producer-invalid:
    build: ./producer
    command: ["python3", "producer.py", "--invalid"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
    profiles:
      - produce-invalid

  consumer-ts:
    build: ./consumer-ts
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats:4222
    profiles:
      - consumers

  consumer-java:
    build: ./consumer-java
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats:4222
    profiles:
      - consumers

volumes:
  nats-data:
